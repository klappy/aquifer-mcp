name = "aquifer-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — captures per-invocation logs, exceptions, CPU and wall time,
# and subrequest counts for 7 days. Enabled in response to incident J-002
# (transient 503s on 2026-04-22T00:17Z). Without this block, edge-injected 5xx
# responses cannot be correlated to a runtime cause.
[observability]
enabled = true

  [observability.logs]
  invocation_logs = true
  head_sampling_rate = 1

[vars]
AQUIFER_ORG = "BibleAquifer"
DOCS_REPO = "docs"
WORKER_ENV = "production"
TELEMETRY_VERIFIED_CLIENTS = ""

[[kv_namespaces]]
binding = "AQUIFER_CACHE"
id = "aa19ca4a80aa48a5bf25317fd9b2d4e1"
preview_id = "f73869e2e7ac4e04a9ee2fa3887ceefe"

# R2 for content files, navigability index, browse catalogs, entity caches.
# KV (AQUIFER_CACHE) retained for SHA pointers, ETags, telemetry counters only.
[[r2_buckets]]
binding = "AQUIFER_CONTENT"
bucket_name = "aquifer-content"

# Optional Wrangler environment for local dev / maintainer experiments (`wrangler dev --env staging`).
# Cloudflare Git builds: branch previews use `<branch-slug>-aquifer-mcp.klappy.workers.dev` (git branch `staging` -> staging-aquifer-mcp.klappy.workers.dev).
# Uses preview KV (shared with `wrangler dev` default preview binding).
[env.staging]
name = "aquifer-mcp-staging"

[env.staging.vars]
AQUIFER_ORG = "BibleAquifer"
DOCS_REPO = "docs"
WORKER_ENV = "staging"
TELEMETRY_VERIFIED_CLIENTS = ""

[[env.staging.kv_namespaces]]
binding = "AQUIFER_CACHE"
id = "f73869e2e7ac4e04a9ee2fa3887ceefe"

[[env.staging.r2_buckets]]
binding = "AQUIFER_CONTENT"
bucket_name = "aquifer-content"

[env.staging.observability]
enabled = true

  [env.staging.observability.logs]
  invocation_logs = true
  head_sampling_rate = 1

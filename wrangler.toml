name = "aquifer-mcp"
main = "src/index.ts"
compatibility_date = "2025-03-14"
compatibility_flags = ["nodejs_compat"]

[vars]
AQUIFER_ORG = "BibleAquifer"
DOCS_REPO = "docs"
WORKER_ENV = "production"
TELEMETRY_VERIFIED_CLIENTS = ""

[[kv_namespaces]]
binding = "AQUIFER_CACHE"
id = "aa19ca4a80aa48a5bf25317fd9b2d4e1"
preview_id = "f73869e2e7ac4e04a9ee2fa3887ceefe"

# Optional Wrangler environment for local dev / maintainer experiments (`wrangler dev --env staging`).
# Cloudflare Git builds: branch previews use `<branch-slug>-aquifer-mcp.klappy.workers.dev` (git branch `staging` -> staging-aquifer-mcp.klappy.workers.dev).
# Uses preview KV (shared with `wrangler dev` default preview binding).
[env.staging]
name = "aquifer-mcp-staging"

[env.staging.vars]
AQUIFER_ORG = "BibleAquifer"
DOCS_REPO = "docs"
WORKER_ENV = "staging"
TELEMETRY_VERIFIED_CLIENTS = ""

[[env.staging.kv_namespaces]]
binding = "AQUIFER_CACHE"
id = "f73869e2e7ac4e04a9ee2fa3887ceefe"
